$schema: https://azuremlschemas.azureedge.net/latest/commandComponent.schema.json
type: command

name: readmission_generate_data
display_name: Generate Synthetic Patient Data
version: 1
description: >
  Generate synthetic patient records for readmission prediction.
  Eliminates the need for manual data upload — data is created on the
  compute cluster using its managed identity.

code: ../../../data_science
command: >-
  python src/generate_data.py
  --output ${{outputs.raw_data}}
  --num_samples ${{inputs.num_samples}}
  --seed ${{inputs.seed}}

environment: azureml://registries/readmit-registry/environments/readmission-train-env/labels/latest

inputs:
  num_samples:
    type: integer
    default: 20000
    description: Number of synthetic patient records to generate.
  seed:
    type: integer
    default: 42
    description: Random seed for reproducibility.

outputs:
  raw_data:
    type: uri_file
    description: Generated patient CSV file.
